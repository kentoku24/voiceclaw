<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>voiceclaw</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: #0d0d0d;
      color: #e0e0e0;
      height: 100dvh;
      display: flex;
      flex-direction: column;
    }

    header {
      padding: 14px 20px;
      background: #1a1a1a;
      border-bottom: 1px solid #2a2a2a;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    header h1 { font-size: 18px; font-weight: 600; color: #fff; }
    #phase-badge {
      margin-left: auto;
      font-size: 12px;
      padding: 3px 10px;
      border-radius: 20px;
      background: #2a2a2a;
      color: #888;
    }
    #phase-badge.watching  { background: #1a3a1a; color: #4caf50; }
    #phase-badge.triggered { background: #3a2a00; color: #ff9800; }
    #phase-badge.busy      { background: #0a1a3a; color: #64b5f6; }

    #history {
      flex: 1;
      overflow-y: auto;
      padding: 16px 20px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .msg {
      max-width: 80%;
      padding: 10px 14px;
      border-radius: 16px;
      font-size: 15px;
      line-height: 1.55;
      white-space: pre-wrap;
    }
    .msg.user {
      align-self: flex-end;
      background: #1e3a5f;
      color: #cce4ff;
      border-bottom-right-radius: 4px;
    }
    .msg.assistant {
      align-self: flex-start;
      background: #1e1e1e;
      color: #e0e0e0;
      border: 1px solid #2a2a2a;
      border-bottom-left-radius: 4px;
    }

    footer {
      padding: 14px 20px;
      background: #111;
      border-top: 1px solid #2a2a2a;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    #status-line {
      font-size: 12px;
      color: #666;
      font-family: ui-monospace, monospace;
      min-height: 16px;
    }
    #controls { display: flex; gap: 10px; }
    #btn {
      flex: 1;
      font-size: 16px;
      padding: 14px;
      border-radius: 12px;
      border: none;
      cursor: pointer;
      font-weight: 600;
      transition: background 0.2s;
      background: #2a2a2a;
      color: #888;
    }
    #btn.watching  { background: #1a3a1a; color: #4caf50; }
    #btn.triggered { background: #3a2a00; color: #ff9800; }
    #btn.busy      { background: #0a1a3a; color: #64b5f6; }
    #clear-btn {
      padding: 14px 16px;
      border-radius: 12px;
      border: 1px solid #2a2a2a;
      background: transparent;
      color: #555;
      cursor: pointer;
      font-size: 18px;
    }
    #clear-btn:hover { color: #888; border-color: #444; }
  </style>
</head>
<body>
  <header>
    <h1>🦞 voiceclaw</h1>
    <span id="phase-badge">停止中</span>
  </header>

  <div id="history"></div>

  <footer>
    <div id="status-line">「開始」を押して「アリス」と呼びかけてください</div>
    <div id="controls">
      <button id="btn">開始</button>
      <button id="clear-btn" title="履歴をクリア">🗑</button>
    </div>
  </footer>

<script>
(function(){
  const historyEl  = document.getElementById('history');
  const statusLine = document.getElementById('status-line');
  const badge      = document.getElementById('phase-badge');
  const btn        = document.getElementById('btn');
  const clearBtn   = document.getElementById('clear-btn');

  const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SpeechRecognition) {
    statusLine.textContent = 'SpeechRecognitionが使えません。Chromeで開いてください。';
    btn.disabled = true;
    return;
  }

  // ---- Web Audio ----
  let audioCtx = null;
  function getAudioCtx() {
    if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    if (audioCtx.state === 'suspended') audioCtx.resume();
    return audioCtx;
  }

  // ---- wake words (longest first) ----
  const WAKE_WORDS = ['アリスちゃん', 'ありすちゃん', 'アリスチャン', 'アリス', 'ありす'];
  function findWakeWord(text) {
    for (const w of WAKE_WORDS) {
      const idx = text.indexOf(w);
      if (idx !== -1) return { idx, len: w.length };
    }
    return null;
  }

  // ---- conversation history ----
  let messages = []; // { role, content }[]

  function addMessage(role, content) {
    messages.push({ role, content });
    const div = document.createElement('div');
    div.className = 'msg ' + role;
    div.textContent = content;
    historyEl.appendChild(div);
    historyEl.scrollTop = historyEl.scrollHeight;
  }

  function clearHistory() {
    messages = [];
    historyEl.innerHTML = '';
  }

  // ---- API ----
  async function apiChat(userText) {
    // Add user turn to history
    messages.push({ role: 'user', content: userText });

    const res = await fetch('/api/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ messages }),
    });
    const data = await res.json().catch(() => null);
    if (!res.ok || !data?.ok) throw new Error(data?.error || `chat failed: ${res.status}`);

    // Add assistant reply to history
    messages.push({ role: 'assistant', content: data.reply });
    return data.reply;
  }

  // ---- TTS ----
  function cleanForTTS(text) {
    return text
      .replace(/\*\*(.*?)\*\*/g, '$1')
      .replace(/\*(.*?)\*/g, '$1')
      .replace(/`[^`]+`/g, '')
      .replace(/#+\s/g, '')
      .trim();
  }

  function speak(text) {
    return new Promise(async (resolve) => {
      if (!text) return resolve();
      const clean = cleanForTTS(text);
      if (!clean) return resolve();
      try {
        const res = await fetch('/api/tts', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ text: clean }),
        });
        if (!res.ok) throw new Error('tts HTTP ' + res.status);
        const arrayBuf = await res.arrayBuffer();
        const ctx = getAudioCtx();
        const audioBuf = await ctx.decodeAudioData(arrayBuf);
        const source = ctx.createBufferSource();
        source.buffer = audioBuf;
        source.connect(ctx.destination);
        source.onended = resolve;
        source.start(0);
      } catch (e) {
        console.warn('[tts] error:', e);
        resolve();
      }
    });
  }

  // ---- phase ----
  let phase = 'idle';
  let recognition = null;
  let awaitingCommand = false;

  function setPhase(p) {
    phase = p;
    const labels = { idle: '停止中', watching: '🟢 待受中', triggered: '🟠 入力中', busy: '🔵 処理中' };
    badge.textContent = labels[p] || p;
    badge.className = p;
    btn.className = p;
    btn.textContent = p === 'idle' ? '開始' : '停止';
  }

  function setStatus(s) { statusLine.textContent = s; }

  // ---- command handler ----
  async function handleCommand(commandText) {
    setPhase('busy');
    setStatus('送信中...');
    addMessage('user', commandText);
    try {
      // messages already has user turn from addMessage, so pass current messages
      // but apiChat also pushes to messages — avoid double push
      // So we send messages manually here:
      const res = await fetch('/api/chat', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ messages }),
      });
      const data = await res.json().catch(() => null);
      if (!res.ok || !data?.ok) throw new Error(data?.error || 'chat failed');
      const reply = data.reply;
      messages.push({ role: 'assistant', content: reply });
      addMessage('assistant', reply);
      setStatus('読み上げ中...');
      await speak(reply);
    } catch (err) {
      setStatus('エラー: ' + (err?.message || String(err)));
    } finally {
      awaitingCommand = false;
      if (phase !== 'idle') {
        setPhase('watching');
        setStatus('「アリス」と呼びかけてください');
      }
    }
  }

  // ---- recognition ----
  function onResult(event) {
    if (phase === 'busy') return;
    for (let i = event.resultIndex; i < event.results.length; i++) {
      const result  = event.results[i];
      const text    = result[0].transcript.trim();
      const isFinal = result.isFinal;
      const wakeMatch = findWakeWord(text);
      const hasWake = !!wakeMatch;

      if (awaitingCommand) {
        if (hasWake) {
          const afterWake = text.slice(wakeMatch.idx + wakeMatch.len).replace(/^[、。,.\s]+/, '').trim();
          if (afterWake && isFinal) { handleCommand(afterWake); return; }
          setStatus('コマンドを話してください... 👂 ' + text);
        } else if (isFinal && text) {
          handleCommand(text); return;
        } else {
          setStatus('コマンドを話してください... 👂 ' + text);
        }
      } else if (phase === 'watching') {
        if (hasWake) {
          const afterWake = text.slice(wakeMatch.idx + wakeMatch.len).replace(/^[、。,.\s]+/, '').trim();
          if (afterWake && isFinal) {
            setPhase('triggered');
            handleCommand(afterWake); return;
          } else {
            awaitingCommand = true;
            setPhase('triggered');
            setStatus('コマンドを話してください...');
          }
        } else {
          setStatus('👂 ' + text + (isFinal ? '' : ''));
        }
      }
    }
  }

  function startWatching() {
    if (recognition) return;
    recognition = new SpeechRecognition();
    recognition.lang = 'ja-JP';
    recognition.interimResults = true;
    recognition.continuous = true;
    recognition.onresult = onResult;
    recognition.onerror = (e) => { if (e.error !== 'no-speech') setStatus('認識エラー: ' + e.error); };
    recognition.onend = () => {
      if (phase !== 'idle' && phase !== 'busy') {
        try { recognition.start(); } catch {}
      }
    };
    try {
      recognition.start();
      setPhase('watching');
      awaitingCommand = false;
      setStatus('「アリス」と呼びかけてください');
    } catch (e) {
      setStatus('開始失敗: ' + e);
      recognition = null;
    }
  }

  function stopWatching() {
    setPhase('idle');
    awaitingCommand = false;
    if (recognition) { try { recognition.stop(); } catch {} recognition = null; }
    setStatus('停止しました');
  }

  btn.addEventListener('click', () => {
    getAudioCtx();
    if (phase === 'idle') startWatching();
    else stopWatching();
  });

  clearBtn.addEventListener('click', () => { clearHistory(); setStatus('履歴をクリアしました'); });
})();
</script>
</body>
</html>
